# Node (Worker) Bootstrap Example

# Typical Path: /`etc/cynode/node.yaml` or Path Given via --Config

# Secrets: Use Orchestrator.registration_psk_env.registration_psk_env or Registration_psk_file_psk_file; Do Not Embed PSK Here

version: 1

orchestrator:
  url: "<http://localhost:12080>"
  registration_psk_env: CYNODE_NODE_REGISTRATION_PSK

# Registration_psk_file_psk_file: /Run/secrets/node_psk/secrets/node_psk

# Timeouts

# Connect_seconds_seconds: 10

# Request_seconds_seconds: 30

node:
  id: "worker-01"
  name: "Local worker 01"

# Labels: ["Trusted", "Region_local_local"]

worker_api:
  listen_host: "0.0.0.0"
  listen_port: 12090
  public_base_url: "<http://localhost:9090>"

sandbox:
  mode: allow
  runtime: podman

# Default_network_policy_network_policy: Restricted
