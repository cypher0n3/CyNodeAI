# Full orchestrator stack: Postgres + control-plane + user-gateway + api-egress + artifacts (MinIO). Ollama is profile-based (profile "ollama").
# MCP tool routes: control-plane (12082). Standalone mcp-gateway (12083) is DEPRECATED and NOT started unless profile "legacy-mcp-gateway" is enabled:
#   docker compose -f orchestrator/docker-compose.yml --profile legacy-mcp-gateway up -d
# See docs/tech_specs/ports_and_endpoints.md.
# Ports: postgres 5432, nats 4222/8222/8223, control-plane 12082, user-gateway 12080, api-egress 12084, minio 9000 (S3 API), ollama 11434 (profile "ollama").
# Run from repo root: docker compose -f orchestrator/docker-compose.yml up -d
# Explicit network for stable DNS and connectivity across restarts (mitigates recurring EOF/flaky host-gateway issues).
networks:
  orchestrator_net:
    name: cynodeai-orchestrator
    driver: bridge

services:
  minio:
    image: minio/minio:latest
    container_name: cynodeai-minio
    command: server /data
    environment:
      MINIO_ROOT_USER: ${ARTIFACTS_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${ARTIFACTS_S3_SECRET_KEY:-minioadmin}
    ports:
      - "${ARTIFACTS_S3_PORT:-9000}:9000"
    volumes:
      - cynodeai-minio-data:/data
    networks:
      - orchestrator_net

  postgres:
    image: pgvector/pgvector:pg16
    container_name: cynodeai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cynodeai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cynodeai-dev-password}
      POSTGRES_DB: ${POSTGRES_DB:-cynodeai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - cynodeai-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 2s
      retries: 30
    networks:
      - orchestrator_net

  nats:
    image: nats:2.10-alpine
    container_name: cynodeai-nats
    command: ["-c", "/etc/nats/nats-server.conf"]
    volumes:
      - ./nats-server-dev.conf:/etc/nats/nats-server.conf:ro
      # NATS_DEV_JWT_DIR is set by scripts/justfile (setup-dev); default ~/.cache/cynodeai/nats-dev-jwt
      - ${NATS_DEV_JWT_DIR}/operator.jwt:/etc/nats/operator.jwt:ro
      - ${NATS_DEV_JWT_DIR}/accounts:/etc/nats/jwt:ro
    ports:
      - "${NATS_CLIENT_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
      - "${NATS_WEBSOCKET_PORT:-8223}:8223"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8222/healthz || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30
    networks:
      - orchestrator_net

  control-plane:
    image: cynodeai-control-plane:dev
    build:
      context: ..
      dockerfile: orchestrator/cmd/control-plane/Containerfile
    container_name: cynodeai-control-plane
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-cynodeai}:${POSTGRES_PASSWORD:-cynodeai-dev-password}@postgres:5432/${POSTGRES_DB:-cynodeai}?sslmode=disable
      ARTIFACTS_S3_ENDPOINT: ${ARTIFACTS_S3_ENDPOINT:-http://minio:9000}
      ARTIFACTS_S3_ACCESS_KEY: ${ARTIFACTS_S3_ACCESS_KEY:-minioadmin}
      ARTIFACTS_S3_SECRET_KEY: ${ARTIFACTS_S3_SECRET_KEY:-minioadmin}
      ARTIFACTS_S3_BUCKET: ${ARTIFACTS_S3_BUCKET:-cynodeai-artifacts}
      CONTROL_PLANE_LISTEN_ADDR: ":12082"
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      NODE_REGISTRATION_PSK: ${NODE_REGISTRATION_PSK:-dev-node-psk-secret}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-admin123}
      WORKER_API_TARGET_URL: ${WORKER_API_TARGET_URL:-http://host.containers.internal:12090}
      WORKER_API_BEARER_TOKEN: ${WORKER_API_BEARER_TOKEN:-dev-worker-api-token-change-me}
      # MCP gateway bearer identities (see orchestrator/internal/mcpgateway/allowlist.go).
      # Non-empty defaults match scripts/e2e_stack_env.sh so local full-demo E2E does not skip MCP tests.
      WORKER_INTERNAL_AGENT_TOKEN: ${WORKER_INTERNAL_AGENT_TOKEN:-dev-worker-internal-agent-token}
      MCP_SANDBOX_AGENT_BEARER_TOKEN: ${MCP_SANDBOX_AGENT_BEARER_TOKEN:-dev-mcp-sandbox-agent-token}
      MCP_PA_AGENT_BEARER_TOKEN: ${MCP_PA_AGENT_BEARER_TOKEN:-dev-mcp-pa-agent-token}
      WORKFLOW_RUNNER_BEARER_TOKEN: ${WORKFLOW_RUNNER_BEARER_TOKEN:-dev-workflow-runner-bearer}
      DISPATCH_HTTP_TIMEOUT: ${DISPATCH_HTTP_TIMEOUT:-300s}
      PMA_ENABLED: ${PMA_ENABLED:-true}
      PMA_IMAGE: ${PMA_IMAGE:-ghcr.io/cypher0n3/cynode-pma:latest}
      # Must match setup-dev NODE_SLUG (default test-e2e-node). PMA managed services attach only to
      # the node identity that polls GET /v1/nodes/config; it must be the same slug as the host worker.
      PMA_HOST_NODE_SLUG: ${PMA_HOST_NODE_SLUG:-test-e2e-node}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      # Dial broker on the compose network; login/bootstrap still use NATS_CLIENT_URL (host-reachable).
      NATS_SERVER_URL: ${NATS_SERVER_URL:-nats://nats:4222}
      NATS_CLIENT_URL: ${NATS_CLIENT_URL:-nats://127.0.0.1:4222}
      NATS_WEBSOCKET_URL: ${NATS_WEBSOCKET_URL:-ws://127.0.0.1:8223/nats}
      # Must match host nats-dev-seeds.json (see setup-dev / gen-nats-dev-jwt) or NATS rejects login-issued user JWTs.
      NATS_ACCOUNT_SEED: ${NATS_ACCOUNT_SEED:-}
      NATS_ACCOUNT_SIGNING_SEED: ${NATS_ACCOUNT_SIGNING_SEED:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${CONTROL_PLANE_PORT:-12082}:12082"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    # Migrations (GORM AutoMigrate + DDL) run before ListenAndServe; /healthz is unavailable until then.
    # A short start_period lets the healthcheck fail the retry budget during long first-boot or upgraded-schema runs,
    # leaving user-gateway blocked on depends_on: service_healthy indefinitely (podman-compose waits forever).
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:12082/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 120s
    networks:
      - orchestrator_net

  user-gateway:
    image: cynodeai-user-gateway:dev
    build:
      context: ..
      dockerfile: orchestrator/cmd/user-gateway/Containerfile
    container_name: cynodeai-user-gateway
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-cynodeai}:${POSTGRES_PASSWORD:-cynodeai-dev-password}@postgres:5432/${POSTGRES_DB:-cynodeai}?sslmode=disable
      ARTIFACTS_S3_ENDPOINT: ${ARTIFACTS_S3_ENDPOINT:-http://minio:9000}
      ARTIFACTS_S3_ACCESS_KEY: ${ARTIFACTS_S3_ACCESS_KEY:-minioadmin}
      ARTIFACTS_S3_SECRET_KEY: ${ARTIFACTS_S3_SECRET_KEY:-minioadmin}
      ARTIFACTS_S3_BUCKET: ${ARTIFACTS_S3_BUCKET:-cynodeai-artifacts}
      USER_GATEWAY_LISTEN_ADDR: ":12080"
      WRITE_TIMEOUT: 300s
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-admin123}
      WORKER_API_BEARER_TOKEN: ${WORKER_API_BEARER_TOKEN:-dev-worker-api-token-change-me}
      # PMA for model=cynodeai.pm is only via worker-reported capability (orchestrator ↔ worker proxy); no env URL.
      # Prompt-mode tasks: orchestrator calls PM model so prompt→model MUST work (MVP Phase 1).
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      INFERENCE_MODEL: ${INFERENCE_MODEL:-qwen3.5:0.8b}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      NATS_SERVER_URL: ${NATS_SERVER_URL:-nats://nats:4222}
      NATS_CLIENT_URL: ${NATS_CLIENT_URL:-nats://127.0.0.1:4222}
      NATS_WEBSOCKET_URL: ${NATS_WEBSOCKET_URL:-ws://127.0.0.1:8223/nats}
      NATS_ACCOUNT_SEED: ${NATS_ACCOUNT_SEED:-}
      NATS_ACCOUNT_SIGNING_SEED: ${NATS_ACCOUNT_SIGNING_SEED:-}
    ports:
      - "${ORCHESTRATOR_PORT:-12080}:12080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      control-plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:12080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - orchestrator_net

  # Profile "ollama": enabled by --ollama-in-stack or SETUP_DEV_OLLAMA_IN_STACK=1.
  # AI agents must NOT use this bypass; node-manager must start Ollama for GPU variant validation.
  ollama:
    profiles: ["ollama"]
    image: ${OLLAMA_IMAGE:-ollama/ollama}
    container_name: cynodeai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # healthcheck:
    #   test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:11434/ || exit 1"]
    #   interval: 15s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 30s
    # Use explicit DNS to avoid runtime DNS degradation after repeated stack restarts
    # (Podman/Docker default resolver can fail with "i/o timeout" after many down/up cycles).
    # dns:
    #   - 8.8.8.8
    #   - 8.8.4.4
    environment:
    # Default context window for all loaded models.                                                               │
    # qwen3:8b supports up to 40 960 tokens natively; 32 768 fits comfortably in the                              │
    # ~11 GB of VRAM headroom available on an RX 7900 XT (20 GB total, 9.4 GB used by                             │
    # the model weights), leaving the KV cache ~1.6 GB.  Override per-deployment with                             │
    # OLLAMA_NUM_CTX if running on hardware with less VRAM.                                                       │
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-32768}
    networks:
      - orchestrator_net

  mcp-gateway:
    profiles: ["legacy-mcp-gateway"]
    build:
      context: ..
      dockerfile: orchestrator/cmd/mcp-gateway/Containerfile
    container_name: cynodeai-mcp-gateway
    environment:
      LISTEN_ADDR: ":12083"
      # Required for tool routing and P2-02 audit logging (help.list and all tools hit toolCallHandler).
      DATABASE_URL: postgres://${POSTGRES_USER:-cynodeai}:${POSTGRES_PASSWORD:-cynodeai-dev-password}@postgres:5432/${POSTGRES_DB:-cynodeai}?sslmode=disable
      NATS_ACCOUNT_SEED: ${NATS_ACCOUNT_SEED:-}
      NATS_ACCOUNT_SIGNING_SEED: ${NATS_ACCOUNT_SIGNING_SEED:-}
    ports:
      - "${MCP_GATEWAY_PORT:-12083}:12083"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:12083/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - orchestrator_net

  api-egress:
    build:
      context: ..
      dockerfile: orchestrator/cmd/api-egress/Containerfile
    container_name: cynodeai-api-egress
    environment:
      LISTEN_ADDR: ":12084"
      NATS_ACCOUNT_SEED: ${NATS_ACCOUNT_SEED:-}
      NATS_ACCOUNT_SIGNING_SEED: ${NATS_ACCOUNT_SIGNING_SEED:-}
    ports:
      - "${API_EGRESS_PORT:-12084}:12084"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:12084/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - orchestrator_net

volumes:
  cynodeai-postgres-data: {}
  cynodeai-minio-data: {}
  ollama-data: {}
