# Local dev NATS: JetStream + HTTP monitoring + WebSocket (no TLS) + decentralized JWT.
# JWT files are generated to the host cache (NATS_DEV_JWT_DIR; default XDG cache) by setup-dev — not in the repo.
# Used by orchestrator/docker-compose.yml (cynodeai-nats). See docs/tech_specs/nats_messaging.md.

port: 4222

http: 8222

jetstream {}

websocket {
  port: 8223
  no_tls: true
}

# operator.jwt + resolver dir: see NATS_DEV_JWT_DIR and orchestrator/cmd/gen-nats-dev-jwt.
# System account is declared on the operator JWT (required when using resolver + JetStream).
operator: "/etc/nats/operator.jwt"

resolver {
  type: full
  dir: "/etc/nats/jwt"
}
