# Full orchestrator stack: Postgres + control-plane + user-gateway + cynode-pma. Ollama is optional (profile "ollama").
# Ports: postgres 5432, control-plane 12082, user-gateway 12080, cynode-pma 8090, ollama 11434 (when profile used).
# Core stack starts without OLLAMA. To include inference: docker compose --profile ollama up -d
# Run from repo root: docker compose -f orchestrator/docker-compose.yml up -d
# Explicit network for stable DNS and connectivity across restarts (mitigates recurring EOF/flaky host-gateway issues).
networks:
  orchestrator_net:
    name: cynodeai-orchestrator
    driver: bridge

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cynodeai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cynodeai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cynodeai-dev-password}
      POSTGRES_DB: ${POSTGRES_DB:-cynodeai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - cynodeai-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 2s
      retries: 30
    networks:
      - orchestrator_net

  control-plane:
    image: cynodeai-control-plane:dev
    build:
      context: ..
      dockerfile: orchestrator/cmd/control-plane/Containerfile
    container_name: cynodeai-control-plane
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-cynodeai}:${POSTGRES_PASSWORD:-cynodeai-dev-password}@postgres:5432/${POSTGRES_DB:-cynodeai}?sslmode=disable
      CONTROL_PLANE_LISTEN_ADDR: ":12082"
      # PMA runs as separate container; do not start cynode-pma subprocess inside this container.
      PMA_ENABLED: "false"
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      NODE_REGISTRATION_PSK: ${NODE_REGISTRATION_PSK:-dev-node-psk-secret}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-admin123}
      WORKER_API_TARGET_URL: ${WORKER_API_TARGET_URL:-http://host.containers.internal:12090}
      WORKER_API_BEARER_TOKEN: ${WORKER_API_BEARER_TOKEN:-dev-worker-api-token-change-me}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${CONTROL_PLANE_PORT:-12082}:12082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - orchestrator_net

  user-gateway:
    image: cynodeai-user-gateway:dev
    build:
      context: ..
      dockerfile: orchestrator/cmd/user-gateway/Containerfile
    container_name: cynodeai-user-gateway
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-cynodeai}:${POSTGRES_PASSWORD:-cynodeai-dev-password}@postgres:5432/${POSTGRES_DB:-cynodeai}?sslmode=disable
      USER_GATEWAY_LISTEN_ADDR: ":12080"
      WRITE_TIMEOUT: 120s
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-admin123}
      # OpenAI chat model=cynodeai.pm routes to PMA.
      PMA_BASE_URL: http://cynode-pma:8090
      # Prompt-mode tasks: orchestrator calls PM model so prompt→model MUST work (MVP Phase 1).
      OLLAMA_BASE_URL: http://ollama:11434
      INFERENCE_MODEL: ${INFERENCE_MODEL:-tinyllama}
    ports:
      - "${ORCHESTRATOR_PORT:-12080}:12080"
    depends_on:
      postgres:
        condition: service_healthy
      cynode-pma:
        condition: service_healthy
    networks:
      - orchestrator_net

  cynode-pma:
    image: cynodeai-cynode-pma:dev
    build:
      context: ..
      dockerfile: agents/cmd/cynode-pma/Containerfile
    container_name: cynodeai-cynode-pma
    environment:
      PMA_ROLE: project_manager
      PMA_LISTEN_ADDR: ":8090"
      # PMA calls Ollama for chat completion; use compose service name.
      OLLAMA_BASE_URL: http://ollama:11434
      INFERENCE_MODEL: ${INFERENCE_MODEL:-tinyllama}
    ports:
      - "${PMA_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8090/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - orchestrator_net

  ollama:
    profiles: ["ollama"]
    image: ${OLLAMA_IMAGE:-ollama/ollama}
    container_name: cynodeai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # Use explicit DNS to avoid runtime DNS degradation after repeated stack restarts
    # (Podman/Docker default resolver can fail with "i/o timeout" after many down/up cycles).
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - orchestrator_net

  mcp-gateway:
    profiles: ["optional"]
    build:
      context: ..
      dockerfile: orchestrator/cmd/mcp-gateway/Containerfile
    container_name: cynodeai-mcp-gateway
    environment:
      LISTEN_ADDR: ":12083"
    ports:
      - "${MCP_GATEWAY_PORT:-12083}:12083"
    networks:
      - orchestrator_net

  api-egress:
    profiles: ["optional"]
    build:
      context: ..
      dockerfile: orchestrator/cmd/api-egress/Containerfile
    container_name: cynodeai-api-egress
    environment:
      LISTEN_ADDR: ":12084"
    ports:
      - "${API_EGRESS_PORT:-12084}:12084"
    networks:
      - orchestrator_net

volumes:
  cynodeai-postgres-data: {}
  ollama-data: {}
